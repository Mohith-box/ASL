<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASL — Sign Up | Abstream Sports League</title>
  <meta name="description" content="Create a player profile or registrar admin account for Abstream Sports League.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .signup-hero {
      padding: 140px 5% 40px;
      text-align: center;
      background-image: radial-gradient(circle at center, var(--accent-glow) 0%, transparent 60%);
    }
    .signup-container {
      max-width: 480px;
      margin: 0 auto 80px;
      padding: 0 20px;
    }
    .photo-upload-wrap {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .photo-preview {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 2px dashed var(--border);
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: var(--text-muted);
    }
    .photo-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-brand" onclick="window.location.href='index.html'">
      <img src="assets/logo.png" alt="ASL Shield Logo" class="nav-logo">
      <div class="nav-brand-text">
        <span class="nav-title">ABSTREAM</span>
        <span class="nav-subtitle">Sports League</span>
      </div>
    </div>
    <div class="nav-links">
      <a href="index.html#hero">Home</a>
      <a href="index.html#sports">Sports</a>
      <a href="rankings.html">Rankings</a>
      <a href="gallery.html">Gallery</a>
    </div>
    <div class="nav-actions">
      <a href="login.html" class="btn btn-outline title-font">Sign In</a>
    </div>
  </nav>

  <header class="signup-hero">
    <span class="section-subtitle">Create Account</span>
    <h1 class="section-title">Sign Up</h1>
    <p class="section-desc">Register a new player dashboard or league admin credentials.</p>
  </header>

  <main class="signup-container">
    <div class="login-panel">
      <div class="login-tabs">
        <button class="login-tab-btn active" id="tabPlayerSignup" onclick="switchSignupMode('player')">Player</button>
        <button class="login-tab-btn" id="tabAdminSignup" onclick="switchSignupMode('admin')">Admin</button>
      </div>

      <form id="aslSignupForm">
        <input type="hidden" id="signupMode" value="player">

        <div class="form-group">
          <label class="form-label" for="signupName">Full Name <span>*</span></label>
          <input type="text" id="signupName" class="form-input" placeholder="e.g. Arjun Sharma" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="signupEmail">Email Address <span>*</span></label>
          <input type="email" id="signupEmail" class="form-input" placeholder="e.g. player@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="signupPassword">Password <span>*</span></label>
          <input type="password" id="signupPassword" class="form-input" placeholder="Min 6 characters" required minlength="6">
        </div>

        <!-- Player Fields -->
        <div id="playerSignupFields">
          <div class="form-group-row">
            <div class="form-group">
              <label class="form-label" for="signupSport">Primary Sport</label>
              <select id="signupSport" class="form-select">
                <option value="badminton">Badminton</option>
                <option value="cricket">Box Cricket</option>
                <option value="esports">eSports</option>
                <option value="pickleball">Pickleball</option>
                <option value="soccer">Soccer</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="signupCategory">Category</label>
              <select id="signupCategory" class="form-select">
                <option value="singles-men">Men Singles</option>
                <option value="doubles-men">Men Doubles</option>
                <option value="singles-women">Women Singles</option>
                <option value="doubles-women">Women Doubles</option>
                <option value="mixed-doubles">Mixed Doubles</option>
              </select>
            </div>
          </div>

          <!-- Profile Photo Upload -->
          <div class="form-group">
            <label class="form-label">Profile Photo <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
            <div class="photo-upload-wrap">
              <div class="photo-preview" id="photoPreviewCircle">📷</div>
              <div style="flex:1;">
                <input type="file" id="signupPhoto" accept="image/jpeg,image/png,image/webp"
                  style="display:none;" onchange="previewPhoto(this)">
                <button type="button" class="btn btn-outline" style="width:100%;padding:10px 14px;font-size:.9rem;"
                  onclick="document.getElementById('signupPhoto').click()">
                  Choose Photo
                </button>
                <p style="font-size:.8rem;color:var(--text-muted);margin-top:6px;">JPG / PNG / WebP · max 2 MB</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Admin Fields -->
        <div id="adminSignupFields" style="display:none;">
          <div class="form-group">
            <label class="form-label" for="signupAdminCode">Admin Invitation Code <span>*</span></label>
            <input type="password" id="signupAdminCode" class="form-input" placeholder="Enter invitation code">
          </div>
        </div>

        <button type="submit" class="btn btn-primary title-font"
          style="width:100%;margin-top:10px;padding:14px;" id="signupSubmitBtn">
          Create Account
        </button>

        <p style="text-align:center;margin-top:20px;font-size:.9rem;color:var(--text-muted);" id="signinRedirectText">
          Already have an account?
          <a href="login.html?mode=player" style="color:var(--accent);font-weight:600;text-decoration:underline;">Sign In</a>
        </p>
      </form>
    </div>
  </main>

  <footer>
    <div class="footer-bottom" style="border:none;padding:40px 5% 20px;text-align:center;color:var(--text-muted);">
      <p>© 2026 Abstream Sports League. All rights reserved.</p>
    </div>
  </footer>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>

  <script>
    function switchSignupMode(mode) {
      document.getElementById('signupMode').value = mode;
      document.getElementById('tabPlayerSignup').classList.toggle('active', mode === 'player');
      document.getElementById('tabAdminSignup').classList.toggle('active', mode === 'admin');
      document.getElementById('playerSignupFields').style.display = mode === 'player' ? 'block' : 'none';
      document.getElementById('adminSignupFields').style.display  = mode === 'admin'  ? 'block' : 'none';
      const adminCode = document.getElementById('signupAdminCode');
      if (adminCode) mode === 'admin' ? adminCode.setAttribute('required','') : adminCode.removeAttribute('required');
      const redirect = document.getElementById('signinRedirectText');
      if (redirect) redirect.innerHTML = `Already have an account? <a href="login.html?mode=${mode}" style="color:var(--accent);font-weight:600;text-decoration:underline;">Sign In</a>`;
    }

    function previewPhoto(input) {
      const preview = document.getElementById('photoPreviewCircle');
      if (!preview) return;
      if (input.files && input.files[0]) {
        const file = input.files[0];
        if (file.size > 2 * 1024 * 1024) {
          alert('Photo must be under 2 MB.');
          input.value = '';
          return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
          preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
        };
        reader.readAsDataURL(file);
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      const mode = new URLSearchParams(window.location.search).get('mode');
      if (mode === 'admin') switchSignupMode('admin');
      else switchSignupMode('player');
    });
  </script>
</body>
</html>
